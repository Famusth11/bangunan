services:
  postgres:
    image: postgres:16-alpine
    container_name: bangunan-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bangunan_db
    ports:
      - "5432:5432"
    volumes:
      - bangunan_postgres_data:/var/lib/postgresql/data

volumes:
  bangunan_postgres_data:
